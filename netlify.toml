[build]
  command = "npm run build:client"
  functions = "netlify/functions"
  publish = "dist/spa"


[build.environment]
  DATABASE_URL = "$NETLIFY_DATABASE_URL_UNPOOLED"


[functions]
  external_node_modules = ["express"]
  node_bundler = "esbuild"
  
[[redirects]]
  force = true
  from = "/api/*"
  status = 200
  to = "/.netlify/functions/api/:splat"
